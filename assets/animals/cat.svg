<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Cute sitting cat silhouette with curled tail -->
  <g fill="#000">
    <!-- Body -->
    <ellipse cx="100" cy="140" rx="38" ry="42"/>
    <!-- Head -->
    <circle cx="100" cy="82" r="28"/>
    <!-- Left ear -->
    <polygon points="78,70 68,40 90,62"/>
    <!-- Right ear -->
    <polygon points="122,70 132,40 110,62"/>
    <!-- Tail curling right -->
    <path d="M 132 155 Q 165 140 170 115 Q 175 95 160 90" stroke="#000" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Inner ear left -->
    <polygon points="80,66 72,46 88,60" fill="#333"/>
    <!-- Inner ear right -->
    <polygon points="120,66 128,46 112,60" fill="#333"/>
    <!-- Eyes -->
    <ellipse cx="90" cy="80" rx="5" ry="6" fill="#fff"/>
    <ellipse cx="110" cy="80" rx="5" ry="6" fill="#fff"/>
    <circle cx="91" cy="81" r="3" fill="#333"/>
    <circle cx="111" cy="81" r="3" fill="#333"/>
    <!-- Nose -->
    <polygon points="100,88 97,92 103,92" fill="#ff8888"/>
    <!-- Whiskers -->
    <line x1="97" y1="90" x2="70" y2="85" stroke="#555" stroke-width="1.5"/>
    <line x1="97" y1="92" x2="68" y2="92" stroke="#555" stroke-width="1.5"/>
    <line x1="103" y1="90" x2="130" y2="85" stroke="#555" stroke-width="1.5"/>
    <line x1="103" y1="92" x2="132" y2="92" stroke="#555" stroke-width="1.5"/>
    <!-- Paws -->
    <ellipse cx="80" cy="175" rx="14" ry="8"/>
    <ellipse cx="120" cy="175" rx="14" ry="8"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Cute sitting bear silhouette -->
  <g fill="#000">
    <!-- Body -->
    <ellipse cx="100" cy="140" rx="48" ry="48"/>
    <!-- Head -->
    <circle cx="100" cy="75" r="32"/>
    <!-- Left round ear -->
    <circle cx="72" cy="52" r="14"/>
    <!-- Right round ear -->
    <circle cx="128" cy="52" r="14"/>
    <!-- Inner ears -->
    <circle cx="72" cy="52" r="8" fill="#ff8888"/>
    <circle cx="128" cy="52" r="8" fill="#ff8888"/>
    <!-- Snout area -->
    <ellipse cx="100" cy="85" rx="16" ry="12" fill="#ddd"/>
    <!-- Nose -->
    <ellipse cx="100" cy="82" rx="6" ry="4" fill="#333"/>
    <!-- Mouth -->
    <path d="M 96 87 Q 100 92 104 87" stroke="#333" stroke-width="1.5" fill="none"/>
    <!-- Eyes -->
    <circle cx="88" cy="72" r="4" fill="#fff"/>
    <circle cx="112" cy="72" r="4" fill="#fff"/>
    <circle cx="89" cy="73" r="2.5" fill="#333"/>
    <circle cx="113" cy="73" r="2.5" fill="#333"/>
    <!-- Belly patch -->
    <ellipse cx="100" cy="145" rx="24" ry="28" fill="#333"/>
    <!-- Front paws -->
    <ellipse cx="68" cy="172" rx="16" ry="10"/>
    <ellipse cx="132" cy="172" rx="16" ry="10"/>
  </g>
</svg>

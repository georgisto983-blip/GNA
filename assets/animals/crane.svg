<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <!-- Cute stylised crane (Japanese crane) standing -->
  <g fill="#000">
    <!-- Body -->
    <ellipse cx="105" cy="120" rx="40" ry="28"/>
    <!-- Neck curve -->
    <path d="M 90 100 Q 70 70 75 40 Q 78 25 85 20" stroke="#fff" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M 90 100 Q 70 70 75 40 Q 78 25 85 20" stroke="#000" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.15"/>
    <!-- White neck outline -->
    <path d="M 90 100 Q 70 70 75 40 Q 78 25 85 20" stroke="#fff" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="85" cy="18" r="12" fill="#fff"/>
    <!-- Red crown patch -->
    <circle cx="85" cy="12" r="6" fill="#ee3333"/>
    <!-- Beak -->
    <polygon points="85,24 72,30 85,28" fill="#888"/>
    <!-- Eye -->
    <circle cx="88" cy="17" r="2.5" fill="#333"/>
    <circle cx="89" cy="16" r="1" fill="#fff"/>
    <!-- Black neck stripe -->
    <path d="M 83 24 Q 78 35 80 50" stroke="#000" stroke-width="4" fill="none"/>
    <!-- White body highlight -->
    <ellipse cx="105" cy="118" rx="30" ry="20" fill="#fff"/>
    <!-- Black tail feathers -->
    <path d="M 140 115 Q 160 105 170 110 Q 165 120 150 125" fill="#000"/>
    <path d="M 135 120 Q 155 115 165 120 Q 158 128 145 130" fill="#000"/>
    <!-- Wing detail -->
    <path d="M 130 110 Q 155 100 160 108" stroke="#000" stroke-width="3" fill="none"/>
    <!-- Legs -->
    <line x1="95" y1="145" x2="90" y2="195" stroke="#333" stroke-width="3"/>
    <line x1="115" y1="145" x2="110" y2="195" stroke="#333" stroke-width="3"/>
    <!-- Feet -->
    <path d="M 82 195 L 90 195 L 96 195" stroke="#333" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 102 195 L 110 195 L 116 195" stroke="#333" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>
</svg>

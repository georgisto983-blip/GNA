<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <!-- Cute stylised giraffe silhouette -->
  <g fill="#000">
    <!-- Body -->
    <ellipse cx="110" cy="155" rx="40" ry="30"/>
    <!-- Neck -->
    <rect x="88" y="60" width="22" height="90" rx="8"/>
    <!-- Head -->
    <ellipse cx="99" cy="50" rx="20" ry="16"/>
    <!-- Ossicones (horns) -->
    <line x1="90" y1="38" x2="88" y2="26" stroke="#000" stroke-width="5" stroke-linecap="round"/>
    <line x1="108" y1="38" x2="110" y2="26" stroke="#000" stroke-width="5" stroke-linecap="round"/>
    <circle cx="88" cy="24" r="4"/>
    <circle cx="110" cy="24" r="4"/>
    <!-- Ears -->
    <ellipse cx="78" cy="44" rx="8" ry="4" transform="rotate(-20 78 44)"/>
    <ellipse cx="120" cy="44" rx="8" ry="4" transform="rotate(20 120 44)"/>
    <!-- Eyes -->
    <circle cx="92" cy="48" r="3.5" fill="#fff"/>
    <circle cx="106" cy="48" r="3.5" fill="#fff"/>
    <circle cx="93" cy="49" r="2" fill="#333"/>
    <circle cx="107" cy="49" r="2" fill="#333"/>
    <!-- Nose -->
    <ellipse cx="99" cy="58" rx="6" ry="3" fill="#333"/>
    <!-- Spots on neck -->
    <circle cx="96" cy="80" r="5" fill="#553300" opacity="0.3"/>
    <circle cx="102" cy="100" r="6" fill="#553300" opacity="0.3"/>
    <circle cx="94" cy="118" r="5" fill="#553300" opacity="0.3"/>
    <!-- Spots on body -->
    <circle cx="120" cy="145" r="7" fill="#553300" opacity="0.3"/>
    <circle cx="100" cy="150" r="6" fill="#553300" opacity="0.3"/>
    <circle cx="130" cy="158" r="5" fill="#553300" opacity="0.3"/>
    <!-- Front legs -->
    <rect x="85" y="178" width="10" height="32" rx="4"/>
    <rect x="100" y="178" width="10" height="32" rx="4"/>
    <!-- Back legs -->
    <rect x="120" y="178" width="10" height="28" rx="4"/>
    <rect x="135" y="178" width="10" height="28" rx="4"/>
    <!-- Hooves -->
    <rect x="84" y="208" width="12" height="5" rx="2" fill="#553300"/>
    <rect x="99" y="208" width="12" height="5" rx="2" fill="#553300"/>
    <rect x="119" y="204" width="12" height="5" rx="2" fill="#553300"/>
    <rect x="134" y="204" width="12" height="5" rx="2" fill="#553300"/>
    <!-- Tail -->
    <path d="M 148 150 Q 165 140 168 130" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="169" cy="127" rx="4" ry="6" fill="#553300"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <!-- Cute stylised deer standing silhouette -->
  <g fill="#000">
    <!-- Body -->
    <ellipse cx="108" cy="130" rx="42" ry="30"/>
    <!-- Neck -->
    <path d="M 80 115 Q 72 85 78 55" stroke="#000" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Head -->
    <ellipse cx="78" cy="48" rx="18" ry="16"/>
    <!-- Antlers left -->
    <path d="M 68 38 L 56 18 M 60 26 L 48 22" stroke="#000" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Antlers right -->
    <path d="M 88 38 L 100 18 M 96 26 L 108 22" stroke="#000" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Ears -->
    <ellipse cx="62" cy="40" rx="8" ry="5" transform="rotate(-30 62 40)"/>
    <ellipse cx="94" cy="40" rx="8" ry="5" transform="rotate(30 94 40)"/>
    <ellipse cx="62" cy="40" rx="5" ry="3" transform="rotate(-30 62 40)" fill="#ff8888"/>
    <ellipse cx="94" cy="40" rx="5" ry="3" transform="rotate(30 94 40)" fill="#ff8888"/>
    <!-- Eyes -->
    <circle cx="72" cy="46" r="3.5" fill="#fff"/>
    <circle cx="84" cy="46" r="3.5" fill="#fff"/>
    <circle cx="73" cy="47" r="2" fill="#333"/>
    <circle cx="85" cy="47" r="2" fill="#333"/>
    <!-- Nose -->
    <ellipse cx="78" cy="56" rx="5" ry="3" fill="#333"/>
    <!-- White chest patch -->
    <ellipse cx="90" cy="118" rx="14" ry="18" fill="#fff" opacity="0.2"/>
    <!-- Spots -->
    <circle cx="100" cy="122" r="3" fill="#fff" opacity="0.15"/>
    <circle cx="115" cy="128" r="3" fill="#fff" opacity="0.15"/>
    <circle cx="120" cy="118" r="2.5" fill="#fff" opacity="0.15"/>
    <circle cx="108" cy="135" r="2.5" fill="#fff" opacity="0.15"/>
    <!-- Front legs -->
    <rect x="82" y="155" width="9" height="38" rx="3"/>
    <rect x="96" y="155" width="9" height="38" rx="3"/>
    <!-- Back legs -->
    <rect x="118" y="155" width="9" height="34" rx="3"/>
    <rect x="132" y="155" width="9" height="34" rx="3"/>
    <!-- Hooves -->
    <rect x="81" y="191" width="11" height="5" rx="2" fill="#553300"/>
    <rect x="95" y="191" width="11" height="5" rx="2" fill="#553300"/>
    <rect x="117" y="187" width="11" height="5" rx="2" fill="#553300"/>
    <rect x="131" y="187" width="11" height="5" rx="2" fill="#553300"/>
    <!-- Tail -->
    <ellipse cx="148" cy="118" rx="6" ry="8" fill="#000"/>
    <ellipse cx="148" cy="118" rx="4" ry="5" fill="#fff" opacity="0.3"/>
  </g>
</svg>
